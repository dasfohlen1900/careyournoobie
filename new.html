<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noob Care 💚</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --y: #f5c518;
  --g: #1a8c3c;
  --b: #1a50c0;
  --r: #e03030;
  --bg: #0e0e0e;
  --panel: #161616;
  --panel2: #1e1e1e;
  --border: #2a2a2a;
  --text: #f0f0f0;
  --muted: #666;
  --chat-bg: #111;
  --pixel: 2px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{
  background:var(--bg);
  font-family:'Nunito',sans-serif;
  color:var(--text);
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  overflow:hidden;
}

/* ── Pixel scanlines ── */
body::after{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,0.08) 0px,rgba(0,0,0,0.08) 1px,transparent 1px,transparent 3px);
  pointer-events:none;z-index:9999;
}

/* ── Roblox pixel border mixin ── */
.pixel-box{
  image-rendering:pixelated;
  border:3px solid #333;
  box-shadow:
    0 0 0 3px #000,
    4px 4px 0 0 #000;
}

.wrapper{
  position:relative;z-index:1;
  width:100%;max-width:480px;
  height:100vh;
  display:flex;flex-direction:column;
  gap:0;
  overflow:hidden;
}
.top-fixed{
  flex-shrink:0;
  display:flex;flex-direction:column;gap:8px;
  padding:8px 8px 0;
  background:var(--bg);
  z-index:10;
}
.bottom-scroll{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  padding:8px 8px 24px;
  display:flex;flex-direction:column;gap:8px;
}
.bottom-scroll::-webkit-scrollbar{width:6px;}
.bottom-scroll::-webkit-scrollbar-track{background:#111;}
.bottom-scroll::-webkit-scrollbar-thumb{background:#333;border:1px solid #000;}

/* ── Header ── */
.header{
  text-align:center;
  border:3px solid var(--g);
  background:var(--panel);
  border-radius:0;
  padding:10px 14px 8px;
  box-shadow:4px 4px 0 #000, 0 0 0 3px #000;
  position:relative;
}
.header h1{
  font-family:'Press Start 2P',monospace;
  font-size:1.4rem;
  color:var(--y);
  text-shadow:3px 3px 0 #7a5e00, 0 0 20px rgba(245,197,24,0.4);
  letter-spacing:2px;
  margin-bottom:6px;
}
.header-sub{
  display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;
}
.badge{
  font-family:'Press Start 2P',monospace;
  font-size:0.65rem;
  padding:5px 10px;
  border:2px solid var(--border);
  background:#111;
  color:var(--y);
  box-shadow:2px 2px 0 #000;
}
.badge.green{color:var(--g);border-color:var(--g);}
.badge.blue{color:#5af;border-color:#5af;}

/* ── Main layout: arena left, stats right on wide ── */
.top-row{
  display:flex;flex-direction:column;gap:10px;
}
.top-row .left{width:100%;}
.top-row .right{width:100%;}

/* ── Arena ── */
#arena{
  position:relative;width:100%;height:280px;
  background:
    linear-gradient(180deg,#0a0f1f 0%,#0a1a0f 65%,#071008 100%);
  border:3px solid var(--g);
  box-shadow:4px 4px 0 #000, inset 0 0 40px rgba(0,0,0,0.7);
  overflow:hidden;cursor:pointer;
}
/* Stars */
#arena::before{
  content:'* . * . * . * . * . * . * . *';
  position:absolute;top:6px;left:0;right:0;
  color:rgba(255,255,255,0.18);font-size:0.55rem;
  letter-spacing:6px;pointer-events:none;font-family:monospace;
}
/* Ground */
.ground{
  position:absolute;bottom:0;left:0;right:0;height:60px;
  background:repeating-linear-gradient(
    90deg,
    #0d2a10 0px,#0d2a10 32px,
    #0a2010 32px,#0a2010 64px
  );
  border-top:3px solid var(--g);
}
.ground::after{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:rgba(74,222,128,0.3);
}

/* Noob wrap */
#noob-wrap{
  position:absolute;bottom:58px;left:155px;width:84px;z-index:10;
  transition:left 1.8s steps(12),bottom 1.8s steps(12);
}

/* Pixel shadow */
.noob-shadow{
  position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);
  width:48px;height:8px;
  background:#000;opacity:0.4;
  clip-path:ellipse(50% 50% at 50% 50%);
  filter:blur(3px);
}

/* ── Speech bubble – fixed top of arena ── */
#bubble{
  position:absolute;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  background:#fff;color:#111;
  border:3px solid #000;
  box-shadow:3px 3px 0 #000;
  padding:5px 10px;
  font-family:'Press Start 2P',monospace;
  font-size:0.6rem;
  line-height:1.7;
  white-space:normal;text-align:center;
  max-width:220px;min-width:80px;
  opacity:1;pointer-events:none;
  z-index:30;
}

#mood-ring{
  position:absolute;top:8px;right:8px;
  font-size:1.8rem;z-index:20;
  image-rendering:pixelated;
}

/* Particles */
.particle{
  position:absolute;pointer-events:none;z-index:25;
  image-rendering:pixelated;
  animation:pf 1.3s steps(8) forwards;
}
@keyframes pf{
  0%{opacity:1;transform:translateY(0);}
  100%{opacity:0;transform:translateY(-60px);}
}

/* Dead overlay */
#dead-screen{
  display:none;position:absolute;inset:0;
  background:rgba(0,0,0,0.92);z-index:50;
  flex-direction:column;align-items:center;justify-content:center;gap:10px;
}
#dead-screen.show{display:flex;}
#dead-screen h2{
  font-family:'Press Start 2P',monospace;font-size:1.1rem;
  color:var(--r);text-shadow:2px 2px 0 #600;
}
#dead-screen p{
  font-family:'Press Start 2P',monospace;font-size:0.55rem;
  color:var(--muted);text-align:center;padding:0 20px;line-height:2;
}
#revive-btn{
  font-family:'Press Start 2P',monospace;font-size:0.7rem;
  background:var(--g);color:#fff;border:3px solid #000;
  box-shadow:3px 3px 0 #000;
  padding:10px 18px;cursor:pointer;
  transition:transform 0.1s;
}
#revive-btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 #000;}

/* ── Stats panel ── */
.stats-panel{
  background:var(--panel);
  border:3px solid var(--border);
  box-shadow:4px 4px 0 #000;
  padding:12px 14px;
  display:flex;flex-direction:column;gap:10px;
}
.stat-row{display:flex;align-items:center;gap:8px;}
.stat-icon{font-size:1.1rem;width:24px;text-align:center;flex-shrink:0;}
.stat-lbl{
  font-family:'Press Start 2P',monospace;
  font-size:0.6rem;color:var(--muted);
  width:72px;flex-shrink:0;
}
.bar-track{
  flex:1;height:14px;
  background:#111;
  border:2px solid #333;
  image-rendering:pixelated;
  overflow:hidden;
}
.bar-fill{
  height:100%;
  transition:width 0.4s steps(10), background 0.3s;
  image-rendering:pixelated;
}
.stat-val{
  font-family:'Press Start 2P',monospace;font-size:0.55rem;
  width:32px;text-align:right;color:var(--muted);flex-shrink:0;
}

/* XP bar */
.xp-row{
  background:var(--panel);border:3px solid var(--border);
  box-shadow:4px 4px 0 #000;
  padding:8px 10px;display:flex;align-items:center;gap:8px;
}
.xp-lbl{font-family:'Press Start 2P',monospace;font-size:0.6rem;color:var(--y);white-space:nowrap;}
.xp-track{flex:1;height:11px;background:#111;border:2px solid #333;overflow:hidden;}
.xp-fill{height:100%;background:repeating-linear-gradient(90deg,var(--y) 0px,var(--y) 4px,#b88a00 4px,#b88a00 8px);transition:width 0.4s steps(10);}
.xp-val{font-family:'Press Start 2P',monospace;font-size:0.55rem;color:var(--muted);white-space:nowrap;}

/* ── Buttons ── */
.sec-lbl{
  font-family:'Press Start 2P',monospace;font-size:0.6rem;
  color:var(--muted);margin:6px 0 5px 2px;
  text-transform:uppercase;letter-spacing:1px;
}
.btn-grid{display:grid;gap:7px;}
.btn-grid.g2{grid-template-columns:1fr 1fr;}
.btn-grid.g3{grid-template-columns:1fr 1fr 1fr;}

.btn{
  position:relative;
  background:var(--panel);
  border:3px solid #333;
  box-shadow:3px 3px 0 #000;
  padding:12px 8px;cursor:pointer;
  color:var(--text);
  font-family:'Nunito',sans-serif;
  font-weight:800;font-size:0.9rem;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  transition:transform 0.08s,box-shadow 0.08s;
  overflow:hidden;user-select:none;
  image-rendering:pixelated;
}
.btn:hover:not(.cooling){
  transform:translate(-1px,-1px);
  box-shadow:4px 4px 0 #000;
}
.btn:active:not(.cooling){
  transform:translate(2px,2px);
  box-shadow:1px 1px 0 #000;
}
.btn .e{font-size:1.7rem;line-height:1;}
.btn .lbl{font-family:'Press Start 2P',monospace;font-size:0.52rem;text-align:center;line-height:1.5;color:#ccc;}
.btn .risk{font-size:0.62rem;color:#f87171;font-weight:700;}
.btn .good{font-size:0.62rem;color:#4ade80;font-weight:700;}

.btn-feed  {border-color:#7a5e00;} .btn-feed:hover  {background:#1c1800;}
.btn-wash  {border-color:#004a7a;} .btn-wash:hover  {background:#00111c;}
.btn-sleep {border-color:#3a2a7a;} .btn-sleep:hover {background:#0d0a1c;}
.btn-medic {border-color:#7a0000;} .btn-medic:hover {background:#1c0000;}
.btn-play  {border-color:#6a006a;} .btn-play:hover  {background:#180018;}
.btn-gym   {border-color:#007a3a;} .btn-gym:hover   {background:#001c0e;}
.btn-tv    {border-color:#4a4a00;} .btn-tv:hover    {background:#111100;}
.btn-junk  {border-color:#7a2000;} .btn-junk:hover  {background:#1c0800;}
.btn-coffee{border-color:#5a3a00;} .btn-coffee:hover{background:#140d00;}

.cd-overlay{
  position:absolute;inset:0;
  background:rgba(0,0,0,0.75);
  display:flex;align-items:center;justify-content:center;
  font-family:'Press Start 2P',monospace;font-size:0.75rem;color:#fff;
  opacity:0;transition:opacity 0.15s;pointer-events:none;
}
.btn.cooling{pointer-events:none;}
.btn.cooling .cd-overlay{opacity:1;}

/* ── CHAT ── */
.chat-wrap{
  background:var(--panel);
  border:3px solid var(--g);
  box-shadow:4px 4px 0 #000;
  display:flex;flex-direction:column;
  overflow:hidden;
  min-height:420px;
}
.chat-header{
  background:var(--g);
  padding:6px 10px;
  font-family:'Press Start 2P',monospace;font-size:0.65rem;
  color:#fff;text-shadow:1px 1px 0 #000;
  display:flex;align-items:center;gap:6px;
  flex-shrink:0;
}
.chat-log{
  flex:1;
  min-height:200px;
  overflow-y:auto;
  padding:8px 10px;
  display:flex;flex-direction:column;gap:6px;
  background:var(--chat-bg);
}
.chat-log::-webkit-scrollbar{width:6px;}
.chat-log::-webkit-scrollbar-track{background:#111;}
.chat-log::-webkit-scrollbar-thumb{background:#333;border:1px solid #000;}

/* Chat messages */
.msg{
  display:flex;align-items:flex-end;gap:6px;
  animation:msgIn 0.15s steps(3) forwards;
}
@keyframes msgIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
.msg.user{flex-direction:row-reverse;}
.msg-bubble{
  max-width:72%;
  padding:5px 9px;
  font-family:'Press Start 2P',monospace;font-size:0.55rem;
  line-height:2;border:2px solid #000;
  box-shadow:2px 2px 0 #000;
}
.msg.noob .msg-bubble{
  background:var(--g);color:#fff;
  border-color:#000;
}
.msg.user .msg-bubble{
  background:#1a50c0;color:#fff;
  border-color:#000;
}
.msg-avatar{
  width:28px;height:28px;flex-shrink:0;
  border:2px solid #000;box-shadow:2px 2px 0 #000;
}

/* Chat input grid */
.chat-bottom{
  border-top:3px solid var(--border);
  flex-shrink:0;
  max-height:220px;
  overflow-y:auto;
  overflow-x:hidden;
}
.chat-bottom::-webkit-scrollbar{width:6px;}
.chat-bottom::-webkit-scrollbar-track{background:#111;}
.chat-bottom::-webkit-scrollbar-thumb{background:#333;border:1px solid #000;}
.phrase-scroll{
  display:flex;
  flex-direction:column;
}
.phrase-btn{
  background:var(--panel2);
  border:none;
  border-bottom:2px solid var(--border);
  padding:11px 12px;
  cursor:pointer;color:var(--text);
  font-family:'Press Start 2P',monospace;font-size:0.5rem;
  white-space:normal;
  text-align:left;
  line-height:1.7;
  transition:background 0.1s;
  width:100%;
}
.phrase-btn:last-child{border-bottom:none;}
.phrase-btn:hover{background:#2a2a2a;}
.phrase-btn:active{background:var(--g);color:#fff;}
.leave-btn{
  background:#1a0000 !important;
  color:#ff4444 !important;
  border-bottom:3px solid #440000 !important;
  font-size:0.55rem !important;
  text-align:center !important;
  letter-spacing:1px;
  position:sticky;top:0;z-index:5;
}
.leave-btn:hover{background:#2a0000 !important;}
.leave-btn:active{background:#ff4444 !important;color:#fff !important;}

/* toast */
#toast{
  position:fixed;bottom:20px;left:50%;
  transform:translateX(-50%) translateY(14px);
  background:var(--panel2);
  border:3px solid var(--border);box-shadow:3px 3px 0 #000;
  padding:8px 16px;
  font-family:'Press Start 2P',monospace;font-size:0.6rem;
  opacity:0;transition:all 0.2s;pointer-events:none;z-index:200;
  white-space:nowrap;max-width:90vw;text-align:center;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── SVG animations ── */
@keyframes idle{
  0%,100%{transform:translateY(0);}50%{transform:translateY(-4px);}
}
@keyframes bounce{
  0%,100%{transform:translateY(0);}30%{transform:translateY(-22px);}60%{transform:translateY(-9px);}
}
@keyframes dance{
  0%,100%{transform:rotate(0);}
  20%{transform:rotate(-13deg);}40%{transform:rotate(14deg)scaleX(-1);}
  60%{transform:rotate(-9deg)scaleX(-1);}80%{transform:rotate(12deg);}
}
@keyframes sleeping{
  0%,100%{transform:rotate(9deg)translateY(5px);}50%{transform:rotate(4deg)translateY(2px);}
}
@keyframes shakeAnim{
  0%,100%{transform:translateX(0);}20%{transform:translateX(-7px);}
  40%{transform:translateX(7px);}60%{transform:translateX(-5px);}80%{transform:translateX(5px);}
}
@keyframes workout{
  0%,100%{transform:scaleY(1)translateY(0);}
  30%{transform:scaleY(0.88)translateY(6px);}60%{transform:scaleY(1.05)translateY(-4px);}
}
@keyframes lvlUp{
  0%{transform:scale(1);}40%{transform:scale(1.35)rotate(-5deg);}70%{transform:scale(1.2)rotate(5deg);}100%{transform:scale(1);}
}
@keyframes blink{
  0%,94%,100%{transform:scaleY(1);}97%{transform:scaleY(0.05);}
}
@keyframes angryShake{
  0%,100%{transform:rotate(0);}25%{transform:rotate(-4deg);}75%{transform:rotate(4deg);}
}
@keyframes hit{
  0%{transform:translateX(0) scaleX(1);}
  15%{transform:translateX(-16px) scaleX(0.88);}
  30%{transform:translateX(20px) scaleX(1.1);}
  55%{transform:translateX(-8px);}
  75%{transform:translateX(6px);}
  100%{transform:translateX(0) scaleX(1);}
}
@keyframes punchFlash{
  0%,100%{opacity:0;}50%{opacity:1;}
}
@keyframes fistFly{
  0%{transform:translate(-70px,-10px) scale(0.4) rotate(-30deg);opacity:0;}
  35%{transform:translate(0,0) scale(1.6) rotate(0deg);opacity:1;}
  60%{transform:translate(8px,6px) scale(1.1);opacity:1;}
  100%{transform:translate(50px,30px) scale(0.2) rotate(20deg);opacity:0;}
}
.btn-punch{
  border-color:#aa0000 !important;
  background:linear-gradient(180deg,#1a0000,#0d0000) !important;
}
.btn-punch:hover:not(.cooling){
  background:linear-gradient(180deg,#2a0000,#1a0000) !important;
  border-color:#ff3333 !important;
  box-shadow:4px 4px 0 #000, 0 0 14px rgba(255,30,30,0.5) !important;
}
.btn-punch .e{ filter:drop-shadow(0 0 5px rgba(255,50,50,0.8)); }
#combo-display{
  position:absolute;top:10px;left:10px;
  font-family:'Press Start 2P',monospace;font-size:0.85rem;
  color:#ff4444;text-shadow:2px 2px 0 #000, 0 0 8px rgba(255,0,0,0.6);
  z-index:20;opacity:0;transition:opacity 0.3s;pointer-events:none;
}
#combo-display.show{opacity:1;}
#hit-flash{
  position:absolute;inset:0;
  background:rgba(255,20,20,0.22);
  pointer-events:none;z-index:15;opacity:0;
}
#hit-flash.flash{animation:punchFlash 0.16s steps(2) forwards;}
#punch-bar{
  position:absolute;bottom:2px;left:0;right:0;height:5px;
  background:#111;border-top:2px solid #333;overflow:hidden;
  opacity:0;transition:opacity 0.3s;z-index:20;
}
#punch-bar.show{opacity:1;}
#punch-bar-fill{
  height:100%;background:#ff4444;
  width:100%;transition:width 0.05s linear;
}
.noob-svg{
  width:84px;display:block;margin:0 auto;
  animation:idle 2.4s steps(8) infinite;
  transition:filter 0.5s;
  image-rendering:pixelated;
}
#eye-l,#eye-r{
  animation:blink 4s ease-in-out infinite;
  transform-box:fill-box;transform-origin:center;
}
#eye-r{animation-delay:0.08s;}
</style>
</head>
<body>
<div class="wrapper">
<div class="top-fixed">

<!-- Header -->
<div class="header">
  <h1>🟩 NOOB CARE 🟩</h1>
  <div class="header-sub">
    <div class="badge">⭐ LVL <span id="lvl-num">1</span> – <span id="lvl-title">Anfänger</span></div>
    <div class="badge green">TAG <span id="age-num">1</span></div>
    <div class="badge blue" id="mood-txt">😄 Glücklich</div>
  </div>
</div>

<!-- Arena -->
<div id="arena" onclick="arenaClick(event)">
      <div class="ground"></div>
      <div id="mood-ring">😄</div>
      <div id="hit-flash"></div>
      <div id="combo-display"></div>
      <div id="punch-bar"><div id="punch-bar-fill"></div></div>
      <div id="bubble">hey! care 4 me pls 🟩</div>

      <div id="noob-wrap">
        <!-- ═══ ROBLOX NOOB SVG ═══ -->
        <svg id="noob-svg" class="noob-svg" viewBox="0 0 84 118" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
          <!-- Shadow -->
          <rect x="18" y="114" width="48" height="4" rx="2" fill="#000" opacity="0.35"/>

          <!-- FEET (black squares = Roblox style) -->
          <rect x="21" y="108" width="18" height="8" rx="1" fill="#111"/>
          <rect x="45" y="108" width="18" height="8" rx="1" fill="#111"/>

          <!-- LEGS blue -->
          <rect x="22" y="82" width="16" height="28" rx="2" fill="#1a50c0"/>
          <rect x="46" y="82" width="16" height="28" rx="2" fill="#1a50c0"/>
          <!-- Leg shading -->
          <rect x="22" y="82" width="4" height="28" rx="0" fill="rgba(0,0,0,0.18)"/>
          <rect x="46" y="82" width="4" height="28" rx="0" fill="rgba(0,0,0,0.18)"/>

          <!-- LEFT ARM -->
          <rect x="4" y="48" width="14" height="30" rx="2" fill="#1a50c0"/>
          <rect x="4" y="48" width="4" height="30" rx="0" fill="rgba(0,0,0,0.15)"/>
          <!-- Left hand -->
          <rect x="4" y="76" width="14" height="10" rx="2" fill="#f5c518"/>

          <!-- RIGHT ARM -->
          <rect x="66" y="48" width="14" height="30" rx="2" fill="#1a50c0"/>
          <rect x="76" y="48" width="4" height="30" rx="0" fill="rgba(0,0,0,0.15)"/>
          <!-- Right hand -->
          <rect x="66" y="76" width="14" height="10" rx="2" fill="#f5c518"/>

          <!-- TORSO green -->
          <rect x="18" y="46" width="48" height="38" rx="2" fill="#1a8c3c"/>
          <!-- Torso shading left -->
          <rect x="18" y="46" width="6" height="38" rx="0" fill="rgba(0,0,0,0.18)"/>
          <!-- Shirt logo area -->
          <rect x="32" y="54" width="20" height="14" rx="2" fill="rgba(255,255,255,0.08)"/>
          <rect x="36" y="58" width="12" height="6" rx="1" fill="rgba(255,255,255,0.12)"/>

          <!-- NECK -->
          <rect x="34" y="38" width="16" height="10" rx="1" fill="#f5c518"/>

          <!-- HEAD yellow -->

function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}

function sendPhrase(phrase){
  if(isDead) return;
  addMsg(phrase,false);

  const lower=phrase.toLowerCase();
  let matched=null;
  for(const r of CHAT_RESPONSES){
    if(r.keys.some(k=>lower.includes(k))){matched=r;break;}
  }

  setTimeout(()=>{
    const response=matched?pick(matched.ans):pick(FALLBACKS);
    const mood=matched?matched.mood:'neutral';
    if(matched && matched.stat) matched.stat();
    addMsg(response,true,mood);
    showBubble(response);
    updateBars();updateMood();
  },400+Math.random()*400);
}

const origC={hunger:'#f5c518',energy:'#38bdf8',fun:'#f472b6',health:'#f87171',hygiene:'#a3e635'};

function gainXP(n){
  xp+=n;

    document.getElementById('lvl-title').textContent=t;

let bT;
function showBubble(txt){
  clearTimeout(bT);
  bubbleEl.textContent=txt;
  repositionBubble();
}

function repositionBubble(){
  const nRect = noobWrap.getBoundingClientRect();
  const bw = 160;
  const bh = 44;
  const margin = 8;
  let left = nRect.left + nRect.width/2 - bw/2;
  left = Math.max(4, Math.min(window.innerWidth - bw - 4, left));
  const spaceAbove = nRect.top - bh - margin;
  if(spaceAbove > 10){
    bubbleEl.style.top = (nRect.top - bh - margin) + 'px';
    bubbleEl.classList.remove('below');
    bubbleEl.classList.add('above');
  } else {
    bubbleEl.style.top = (nRect.bottom + margin) + 'px';
    bubbleEl.classList.remove('above');
    bubbleEl.classList.add('below');
  }
  bubbleEl.style.left = left + 'px';
}
let tT;
function showToast(msg){
  clearTimeout(tT);
  toastEl.textContent=msg;
  toastEl.classList.add('show');
  tT=setTimeout(()=>toastEl.classList.remove('show'),3000);
}

  for(let i=0;i<count;i++){

    spawnParticles(5,['💸','😢','❌']);
    showToast('💸 Verloren! Spaß –20');
  }
  updateBars(); updateMood(); startCD('btn-gamble','cd-gamble',5);
}

function doThrow(){
  if(isDead)return; sleepMode=false;
  health=clamp(health-20); fun=clamp(fun-8);
  triggerHitEffect(['AU!! EIN STEIN!!','WARUM EIN ZIEGEL?!','ICH FLIEG!!','Das war ILLEGAL!!','OW OW OW OW!!','Noob down!! 💥']);
  // Noob fliegt weit weg
  noobWrap.style.left = (Math.random()<0.5 ? 10 : 250) + 'px';
  noobWrap.style.bottom = '65px';
  setTimeout(repositionBubble, 1900);
  setExpr('angry'); animNoob('hit 0.6s steps(6)');
  spawnParticles(8,['🧱','💥','😵','⭐']);
  updateBars(); updateMood(); startCD('btn-throw','cd-throw',4);
}

function doYell(){
  if(isDead)return; sleepMode=false;
  fun=clamp(fun-22); energy=clamp(energy-15); health=clamp(health-5);
  const phrases=['ich... ich weine jetzt 😭','bitte nicht schreien...','das tut weh... im Herz','warum bist du so laut?!','*schluchz*','ich hab Angst 😢','ich will meine Mama!!'];
  showBubble(pick(phrases)); setExpr('sad');
  animNoob('shakeAnim 0.7s steps(6)');
  spawnParticles(6,['😭','💧','😢','💔']);
  // Shake the whole arena
  arena.style.transform='translate(-4px,0)';
  setTimeout(()=>{arena.style.transform='translate(4px,0)';},80);
  setTimeout(()=>{arena.style.transform='translate(-2px,0)';},160);
  setTimeout(()=>{arena.style.transform='';},240);
  showToast('😤 Noob ist traumatisiert! Spaß –22');
  updateBars(); updateMood(); startCD('btn-yell','cd-yell',3);
}

// ─── Arena click ──────────────────────────────────────────────────────────────
// ─── PUNCH system ────────────────────────────────────────────────
let combo = 0, comboTimer;
const hitFlash = document.getElementById('hit-flash');
const comboDis = document.getElementById('combo-display');
const punchBar = document.getElementById('punch-bar');
const punchBarFill = document.getElementById('punch-bar-fill');

const PUNCH_PHRASES = [
  'OW!! 😢','AU!!','Warum?!','SCHMERZ!!','Das tut weh!!',
  'OUCH!!','Ich bin am Weinen!!','Aufhören!!','Hör auf!!','Bitte nicht!!',
  'ICH HAB NICHTS GETAN!!','😭😭😭','Ich hasse dich!!','MONSTER!!','oof oof oof'
];
const KICK_PHRASES = [
  'AAAH!! 🦵','Mein Bauch!!','NEIN!!','Warum TRITTST du mich?!',
  'Das war mein bestes Organ!!','ICH KLAGE DICH AN!!','Ich flieg durch die Luft!!',
  'Zu weit!! ZU WEIT!!','YEET!!','Ich dreh mich... 😵'
];
const HIGH_COMBO = ['COMBO x','BRUTAL!!','NICHT AUFHÖREN!!','SAVAGE!!'];

function triggerHitEffect(phrasePool){
  // Flash
  hitFlash.classList.remove('flash');
  void hitFlash.offsetWidth;
  hitFlash.classList.add('flash');

  // Combo
  clearTimeout(comboTimer);
  combo++;
  let label = combo >= 5 ? pick(HIGH_COMBO) + combo : 'COMBO x' + combo;
  comboDis.textContent = label;
  comboDis.classList.add('show');
  comboDis.style.fontSize = Math.min(0.6 + combo * 0.06, 1.1) + 'rem';
  comboTimer = setTimeout(() => { combo = 0; comboDis.classList.remove('show'); }, 1800);

  // Fist particle
  const rect = arena.getBoundingClientRect();
  const nr = noobWrap.getBoundingClientRect();
  const fx = nr.left - rect.left + Math.random() * 50 + 10;
  const fy = nr.top - rect.top + 20;
  const fist = document.createElement('div');
  fist.style.cssText = 'position:absolute;font-size:1.6rem;pointer-events:none;z-index:25;left:'+fx+'px;top:'+fy+'px;animation:fistFly 0.45s steps(6) forwards;';
  fist.textContent = phrasePool === KICK_PHRASES ? '🦵' : '👊';
  arena.appendChild(fist);
  setTimeout(() => fist.remove(), 500);

  // Stars
  spawnParticles(3 + Math.min(combo, 5), ['💥','⭐','😵','✨']);

  // Speech
  showBubble(pick(phrasePool));

  // Screen shake via arena
  arena.style.transform = 'translate(' + (Math.random()*6-3) + 'px,' + (Math.random()*4-2) + 'px)';
  setTimeout(() => arena.style.transform = '', 80);
}

function doPunch(){
  if(isDead) return;
  sleepMode = false;
  health  = clamp(health - 8);
  fun     = clamp(fun - 6);
  hygiene = clamp(hygiene - 2);
  triggerHitEffect(PUNCH_PHRASES);
  setExpr('sad');
  animNoob('hit 0.4s steps(6)');
  updateBars(); updateMood();
  startCD('btn-punch','cd-punch', 1);
}

function doKick(){
  if(isDead) return;
  sleepMode = false;
  health  = clamp(health - 14);
  energy  = clamp(energy - 10);
  fun     = clamp(fun - 10);
  triggerHitEffect(KICK_PHRASES);
  setExpr('angry');
  // Noob flies sideways
  const curLeft = parseInt(noobWrap.style.left) || 160;
  const kickDir = curLeft < 200 ? 80 : -80;
  noobWrap.style.left = clamp2(curLeft + kickDir, 10, 260) + 'px';
  animNoob('hit 0.5s steps(6)');
  updateBars(); updateMood();
  startCD('btn-kick','cd-kick', 2);
}

function clamp2(v, mn, mx){ return Math.max(mn, Math.min(mx, v)); }

function arenaClick(e){
  if(isDead||e.target.closest('button'))return;
  if(Math.random()<0.45)showBubble(pick(AUTO_PHRASES));
  const p=document.createElement('div');p.className='particle';p.textContent=pick(['✨','💫','💚','🟩','⭐']);
  p.style.fontSize='1rem';p.style.left=(e.offsetX-8)+'px';p.style.top=(e.offsetY-8)+'px';
  arena.appendChild(p);setTimeout(()=>p.remove(),1500);
}

// ─── Decay ────────────────────────────────────────────────────────────────────
setInterval(()=>{
  if(isDead)return;
  dayTick++;if(dayTick%40===0){day++;document.getElementById('age-num').textContent=day;}
  if(!sleepMode){hunger=clamp(hunger-1.3);energy=clamp(energy-0.8);fun=clamp(fun-1.0);hygiene=clamp(hygiene-0.55);}
  if(hygiene<20&&Math.random()<0.05){health=clamp(health-2.5);if(!isSick){isSick=true;showToast('🦠 Krank! Hygiene zu niedrig.');}}
  if(hunger<10)health=clamp(health-1.5);
  if(health<=0||(hunger<=0&&energy<=0)){
    isDead=true;noobSvg.style.filter='grayscale(1) brightness(0.2)';
    noobSvg.style.animation='none';setExpr('sad');deadScr.classList.add('show');return;
  }
  updateBars();updateMood();
},1500);

// ─── Revive ───────────────────────────────────────────────────────────────────
document.getElementById('revive-btn').onclick=()=>{
  isDead=false;isSick=false;sleepMode=false;caffeine=0;
  hunger=65;energy=65;fun=65;health=65;hygiene=65;
  xp=0;level=1;day=1;dayTick=0;
  document.getElementById('lvl-num').textContent=1;
  document.getElementById('lvl-title').textContent=LEVELS[0];
  document.getElementById('age-num').textContent=1;
  noobSvg.style.filter='';noobSvg.style.animation='idle 2.4s steps(8) infinite';
  deadScr.classList.remove('show');setExpr('neutral');
  showToast('💚 NOOB IST ZURÜCK!');showBubble('Ich lebe wieder!! 🟩');
  updateBars();updateMood();updateXP();
  // welcome back chat
  setTimeout(()=>addMsg('ich bin wieder da!! habt ihr mich vermisst?',true,'excited'),600);
};

// ─── Init ─────────────────────────────────────────────────────────────────────
initChatPhrases();
updateBars();updateMood();updateXP();
setTimeout(()=>{
  addMsg('HALLO!! Ich bin Noob! Kümmere dich bitte um mich 🟩',true,'excited');
},900);
</script>
